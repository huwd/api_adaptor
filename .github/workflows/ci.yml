name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec

      - name: Build gem
        run: bundle exec rake build

      - name: Install built gem and require it
        run: |
          set -euo pipefail
          GEM_FILE="$(ls -1 pkg/*.gem | head -n 1)"
          gem install "$GEM_FILE" --no-document
          ruby -r api_adaptor -e 'puts ApiAdaptor::VERSION'
